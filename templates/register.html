{% extends "base.html" %}

{% block title %}Регистрация - HubBot{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <a href="/" class="logo-container">
            <div class="brand-mark"><span>HB</span></div>
            <div class="logo-text">HubBot</div>
        </a>
        <h2>Создать аккаунт</h2>
        <p class="subtitle">Начните эффективно управлять задачами</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form action="/register" method="POST">
            <div class="input-group">
                <label>Придумайте логин</label>
                <input type="text" name="username" required>
            </div>
            
            <div class="input-group">
                <label>Придумайте пароль</label>
                <input type="password" name="password" required>
            </div>
            
            <button type="submit" class="auth-btn">Зарегистрироваться</button>
        </form>
        
        <p class="switch-auth">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
</div>
{% endblock %}
