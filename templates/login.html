{% extends "base.html" %}

{% block title %}Вход - HubBot{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <a href="/" class="logo-container">
            <div class="brand-mark"><span>HB</span></div>
            <div class="logo-text">HubBot</div>
        </a>
        <h2>С возвращением</h2>
        <p class="subtitle">Войдите в свой аккаунт, чтобы продолжить</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="input-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" required>
            </div>
            
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            
            <button type="submit" class="auth-btn">Войти</button>
        </form>
        
        <p class="switch-auth">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
    </div>
</div>
{% endblock %}
